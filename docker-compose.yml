services:
  postgres:
    image: postgres:16-alpine
    container_name: nika-memory-postgres
    environment:
      POSTGRES_USER: nika
      POSTGRES_PASSWORD: nika
      POSTGRES_DB: nika_memory
    ports:
      - "5432:5432"
    volumes:
      - nika_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nika -d nika_memory"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: nika-memory-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - nika_qdrant_data:/qdrant/storage

volumes:
  nika_postgres_data:
  nika_qdrant_data:
