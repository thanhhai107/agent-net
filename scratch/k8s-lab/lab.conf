LAB_DESCRIPTION="A lab implementing a fat-tree with BGP routing, with Kubernetes (k3s) deploying some services"
LAB_VERSION=2.0
LAB_AUTHOR="M. Scazzariello"

### POD 1
# Leafs
leaf_1_1[0]="A"
leaf_1_1[1]="B"
leaf_1_1[2]="C"
leaf_1_1[3]="U"
leaf_1_1[4]="AA"
leaf_1_2[0]="D"
leaf_1_2[1]="E"
leaf_1_2[2]="V"
leaf_1_2[3]="Z"
leaf_1_2[4]="AB"

# Spines
spine_1_1[0]="A"
spine_1_1[1]="D"
spine_1_1[2]="G"
spine_1_1[3]="H"
spine_1_2[0]="B"
spine_1_2[1]="E"
spine_1_2[2]="I"
spine_1_2[3]="J"

# Servers
controller[0]="C"
worker1[0]="U"
worker2[0]="AA"
worker3[0]="V"
worker4[0]="Z"
worker5[0]="AB"

### POD 2
# Spines
spine_2_1[0]="K"
spine_2_1[1]="N"
spine_2_1[2]="Q"
spine_2_1[3]="R"
spine_2_2[0]="L"
spine_2_2[1]="O"
spine_2_2[2]="S"
spine_2_2[3]="T"

# Leafs
leaf_2_1[0]="K"
leaf_2_1[1]="L"
leaf_2_1[2]="F"
leaf_2_2[0]="N"
leaf_2_2[1]="O"
leaf_2_2[2]="P"

## CORE SWITCHES
core_1_1[0]="G"
core_1_1[1]="I"
core_1_1[2]="Q"
core_1_1[3]="S"
core_1_2[0]="H"
core_1_2[1]="J"
core_1_2[2]="R"
core_1_2[3]="T"

# Exit router from the data center
dc_exit[0]="AC"
dc_exit[1]="F"
dc_exit[2]="P"

# AS1 devices
as1r1[0]="AC"
as1r1[1]="M"

# AS2 devices
as2r1[0]="W"
as2r1[1]="M"
# Connect to the host to have Internet connectivity (this will be eth2)
as2r1[bridged]="True"

client[0]="W"

# Multipath policy
# Docs here: https://www.kernel.org/doc/Documentation/networking/ip-sysctl.txt
# Possible values: 0 - Layer 3, 1 - Layer 4, 2 - Layer 3 or inner Layer 3 if present
# Default: 0
# We set 1 to get Layer 4 ECMP as in real datacenters
core_1_2[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
core_1_1[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
spine_1_1[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
spine_1_2[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
spine_2_1[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
spine_2_2[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
leaf_1_1[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
leaf_1_2[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
leaf_2_1[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
leaf_2_2[sysctl]="net.ipv4.fib_multipath_hash_policy=1"
dc_exit[sysctl]="net.ipv4.fib_multipath_hash_policy=1"

# Image definitions
core_1_1[image]="kathara/frr"
core_1_2[image]="kathara/frr"
spine_1_1[image]="kathara/frr"
spine_1_2[image]="kathara/frr"
spine_2_1[image]="kathara/frr"
spine_2_2[image]="kathara/frr"
leaf_1_1[image]="kathara/frr"
leaf_1_2[image]="kathara/frr"
leaf_2_1[image]="kathara/frr"
leaf_2_2[image]="kathara/frr"
dc_exit[image]="kathara/frr"
controller[image]="rancher/k3s"
worker1[image]="rancher/k3s"
worker2[image]="rancher/k3s"
worker3[image]="rancher/k3s"
worker4[image]="rancher/k3s"
worker5[image]="rancher/k3s"
as1r1[image]="kathara/frr"
as2r1[image]="kathara/frr"
client[image]="kathara/base"

# Servers ulimits, needed by k3s
controller[ulimit]="nproc=65535"
controller[ulimit]="nofile=65535"
worker1[ulimit]="nproc=65535"
worker1[ulimit]="nofile=65535"
worker2[ulimit]="nproc=65535"
worker2[ulimit]="nofile=65535"
worker3[ulimit]="nproc=65535"
worker3[ulimit]="nofile=65535"
worker4[ulimit]="nproc=65535"
worker4[ulimit]="nofile=65535"
worker5[ulimit]="nproc=65535"
worker5[ulimit]="nofile=65535"

# k3s requires privileged nodes
controller[privileged]="true"
worker1[privileged]="true"
worker2[privileged]="true"
worker3[privileged]="true"
worker4[privileged]="true"
worker5[privileged]="true"

# Environment variables, needed by k3s
controller[env]="K3S_TOKEN=secret"
controller[args]="server --disable servicelb --disable traefik --write-kubeconfig-mode 644"
controller[shell]="/bin/sh"
worker1[env]="K3S_URL=https://controller:6443"
worker1[env]="K3S_TOKEN=secret"
worker1[shell]="/bin/sh"
worker2[env]="K3S_URL=https://controller:6443"
worker2[env]="K3S_TOKEN=secret"
worker2[shell]="/bin/sh"
worker3[env]="K3S_URL=https://controller:6443"
worker3[env]="K3S_TOKEN=secret"
worker3[shell]="/bin/sh"
worker4[env]="K3S_URL=https://controller:6443"
worker4[env]="K3S_TOKEN=secret"
worker4[shell]="/bin/sh"
worker5[env]="K3S_URL=https://controller:6443"
worker5[env]="K3S_TOKEN=secret"
worker5[shell]="/bin/sh"

# Enable IPv6 for FRR unumbered interfaces
core_1_2[ipv6]="True"
core_1_1[ipv6]="True"
spine_1_1[ipv6]="True"
spine_1_2[ipv6]="True"
spine_2_1[ipv6]="True"
spine_2_2[ipv6]="True"
leaf_1_1[ipv6]="True"
leaf_1_2[ipv6]="True"
leaf_2_1[ipv6]="True"
leaf_2_2[ipv6]="True"