apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: llm-d-pool
  namespace: metallb-system
spec:
  addresses:
  - 200.0.0.240-200.0.0.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: llm-d-l2
  namespace: metallb-system
spec:
  ipAddressPools:
  - llm-d-pool