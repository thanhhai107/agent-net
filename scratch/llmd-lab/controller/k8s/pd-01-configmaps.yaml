apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config
  namespace: llm-d
data:
  epp-config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: approx-prefix-cache-producer
      parameters:
        blockSizeTokens: 16
        autoTune: false
        maxPrefixBlocksToMatch: 256
        lruCapacityPerServer: 31250
    - type: prefix-cache-scorer
    - type: queue-scorer
    - type: prefill-filter
    - type: decode-filter
    - type: max-score-picker
    - type: prefix-based-pd-decider
      parameters:
        nonCachedTokens: 16
    - type: disagg-profile-handler
      parameters:
        deciders:
          prefill: prefix-based-pd-decider
    schedulingProfiles:
    - name: prefill
      plugins:
      - pluginRef: prefill-filter
      - pluginRef: max-score-picker
      - pluginRef: prefix-cache-scorer
        weight: 2
      - pluginRef: queue-scorer
        weight: 1
    - name: decode
      plugins:
      - pluginRef: decode-filter
      - pluginRef: max-score-picker
      - pluginRef: prefix-cache-scorer
        weight: 2
      - pluginRef: queue-scorer
        weight: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-sim-config
  namespace: llm-d
data:
  config.yaml: |
    port: 8000
    model: "llm-d-sim"
    max-num-seqs: 32
    mode: "random"
    time-to-first-token: "500ms"
    inter-token-latency: "50ms"
    kv-cache-transfer-latency: "100ms"
    seed: 42
