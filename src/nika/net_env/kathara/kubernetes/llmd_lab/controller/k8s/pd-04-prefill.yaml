apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-sim-p
  namespace: llm-d
  labels:
    app: llm-d-pd
    llm-d.ai/role: prefill
    llm-d.ai/guide: pd-disaggregation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: llm-d-pd
      llm-d.ai/role: prefill
  template:
    metadata:
      labels:
        app: llm-d-pd
        llm-d.ai/role: prefill
        llm-d.ai/guide: pd-disaggregation
    spec:
      containers:
      - name: vllm-prefill
        image: ghcr.io/llm-d/llm-d-inference-sim:latest
        imagePullPolicy: IfNotPresent
        args:
        - --config=/etc/sim/config.yaml
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 60
          periodSeconds: 5
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: sim-config
          mountPath: /etc/sim
          readOnly: true
      volumes:
      - name: sim-config
        configMap:
          name: inference-sim-config
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-sim-p-service
  namespace: llm-d
spec:
  selector:
    llm-d.ai/role: prefill
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
