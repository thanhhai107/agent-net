baseline:
  benchmark: benchmark_evolve.yaml
  agent_type: react
  llm_provider: custom
  model: openai/gpt-oss-120b
  max_steps: 50
  max_attempts: 3
  judge_evaluation: false
  judge_provider: custom
  judge_model: openai/gpt-oss-120b

tool_refinement:
  llm_backend: custom
  llm_model: openai/gpt-oss-120b
  timeout_seconds: 20
  max_retries: 0
  tool_doc_chars: 500
  convergence_threshold: 0.75
  exploration_similarity_threshold: 0.9
  explorer_reflection_limit: 3
  guidance_total_token_budget: 480
  guidance_min_token_budget: 120
  guidance_per_tool_token_budget: 120

procedural_memory:
  llm_backend: custom
  llm_model: openai/gpt-oss-120b
  skill_logprob_model: openai/gpt-oss-120b
  timeout_seconds: 20
  max_retries: 0
  top_k: 5
  token_budget: 1500
  max_skill_age: 8
  pool_size: 32
  evolution_threshold: 6
  best_of_n: 3
  ppo_epsilon: 0.2
  selection_epsilon: 0.3
  experience_pool_size: 1000
  golden_pool_size: 20
  baseline_ema_alpha: 0.1
  selection_epsilon_decay_cases: 500
  acceptance_margin: 0.001
  policy_token_budget_min: 120
  policy_token_budget_max: 350
  policy_token_budget_divisor: 2
  followup_token_budget: 100
  tool_guidance_char_budget: 120
