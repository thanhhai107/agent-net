baseline:
  benchmark: benchmark_selected.yaml
  training_benchmark: benchmark_training.yaml
  evaluate_benchmark: benchmark_selected.yaml
  agent_type: react
  llm_provider: custom
  model: openai/gpt-oss-120b
  max_steps: 50
  max_attempts: 3
  judge_evaluation: false
  judge_provider: custom
  judge_model: openai/gpt-oss-120b

tool_refinement:
  llm_backend: custom
  llm_model: openai/gpt-oss-120b
  timeout_seconds: 20
  max_retries: 0
  tool_doc_chars: 500
  convergence_threshold: 0.75
  exploration_similarity_threshold: 0.9
  explorer_reflection_limit: 3
  update_interval: 6
  min_new_trials: 2
  max_tools_per_update: 8
  publish_min_utility: 0.3
  guidance_total_token_budget: 480
  guidance_min_token_budget: 120
  guidance_per_tool_token_budget: 120

procedural_memory:
  llm_backend: custom
  llm_model: openai/gpt-oss-120b
  skill_logprob_model: openai/gpt-oss-120b
  timeout_seconds: 20
  max_retries: 0
  token_budget: 1500
  max_skill_age: 8
  pool_size: 16
  # Keep training reachable on the 100-case benchmark while preserving a
  # disjoint verification trajectory for every candidate attempt.  Keep
  # best-of-N at two until verifier quality is measured; increasing it would
  # multiply the provider calls that dominated experiment-02 runtime.
  evolution_threshold: 3
  best_of_n: 2
  ppo_epsilon: 0.2
  selection_epsilon: 0.25
  experience_pool_size: 256
  baseline_ema_alpha: 0.1
  selection_epsilon_decay_cases: 100
  acceptance_margin: 0.01
  verifier: behavioral_replay
  holdout_size: 1
  min_positive_advantage: 1
  policy_token_budget_min: 120
  policy_token_budget_max: 350
  policy_token_budget_divisor: 2
  tool_guidance_char_budget: 120
